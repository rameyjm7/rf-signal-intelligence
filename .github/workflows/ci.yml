name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Lint
        run: ruff check src tests

      - name: Unit tests (non-integration)
        run: |
          mkdir -p reports
          pytest -q -m "not integration" -rs --junitxml=reports/pytest-unit.xml

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-report
          path: reports/pytest-unit.xml

      - name: Publish unit test results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/pytest-unit.xml

  pylint:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pylint
        run: |
          pylint --rcfile=.pylintrc \
            src/rf_signal_intelligence/__init__.py \
            src/rf_signal_intelligence/__main__.py \
            src/rf_signal_intelligence/core/run_mode.py \
            src/rf_signal_intelligence/core/callbacks.py \
            src/rf_signal_intelligence/models/__init__.py \
            tests/integration_policy.py \
            tests/test_cli_defaults.py \
            tests/test_cli_imports.py \
            tests/test_registries.py

  integration:
    runs-on: ubuntu-latest
    needs: [test, pylint]
    env:
      INTEGRATION_ARTIFACT_POLICY: skip_if_missing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Artifact policy summary
        run: |
          echo "Integration artifact policy: ${INTEGRATION_ARTIFACT_POLICY}"
          echo "Set INTEGRATION_ARTIFACT_POLICY=require to fail on missing artifacts."

      - name: Registry smoke check (artifact-aware)
        run: |
          python scripts/smoke_eval_registry.py

      - name: Integration tests (CPU, may skip if artifacts are missing)
        run: |
          mkdir -p reports
          pytest -q -m integration -rs --junitxml=reports/pytest-integration.xml

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-integration-report
          path: reports/pytest-integration.xml

      - name: Publish integration test results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/pytest-integration.xml
